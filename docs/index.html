<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alun reader 发布页</title>
    <meta name="description" content="alun reader 的 GitHub Pages 发布页，提供版本说明、下载入口和更新检查状态。" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f6f7f8;
        color: #172033;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        padding: 48px 20px;
      }

      .shell {
        max-width: 960px;
        margin: 0 auto;
      }

      .hero {
        display: grid;
        gap: 24px;
        padding: 40px;
        border: 1px solid #d8dee8;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo {
        width: 52px;
        height: 52px;
        border-radius: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a,
      button {
        min-height: 42px;
        border-radius: 8px;
        border: 1px solid #bfccd9;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #172033;
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
        cursor: pointer;
      }

      .primary {
        border-color: #1f2937;
        background: #1f2937;
        color: #ffffff;
      }

      .status {
        margin-top: 24px;
        padding: 18px;
        border: 1px solid #d8dee8;
        border-radius: 10px;
        background: #ffffff;
      }

      .status strong {
        display: block;
        margin-bottom: 6px;
      }

      .status.failed {
        border-color: #fecaca;
        background: #fff7f7;
      }

      .status.success {
        border-color: #bbf7d0;
        background: #f0fdf4;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 24px;
      }

      .card {
        padding: 18px;
        border: 1px solid #d8dee8;
        border-radius: 10px;
        background: #ffffff;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #11161c;
          color: #f8fafc;
        }

        .hero,
        .status,
        .card {
          border-color: #334155;
          background: #151b22;
          box-shadow: none;
        }

        p {
          color: #cbd5e1;
        }

        a,
        button {
          border-color: #475569;
          background: #151b22;
          color: #f8fafc;
        }

        .primary {
          border-color: #cbd5e1;
          background: #e2e8f0;
          color: #111827;
        }

        .status.failed {
          border-color: #7f1d1d;
          background: #2a1517;
        }

        .status.success {
          border-color: #166534;
          background: #102016;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <section class="hero">
          <div class="title-row">
            <img class="logo" src="../assets/icon.png" alt="alun reader 图标" />
            <h1>alun reader</h1>
          </div>
          <p>跨平台 Markdown 与 Mermaid 桌面阅读器，支持本地文件保存、多窗口、Zen 投屏模式和深浅色主题。</p>
          <div class="actions">
            <a class="primary" href="https://github.com/unknownparticles/md/releases">查看 Release</a>
            <a href="https://github.com/unknownparticles/md/releases/latest">最新版本链接</a>
            <button id="check-update" type="button">检查更新</button>
          </div>
        </section>

        <section id="release-status" class="status">
          <strong>更新状态</strong>
          <p>点击“检查更新”会优先访问 GitHub Release API；如果 API 限流，会改用本页面同目录的静态更新清单。</p>
        </section>

        <section class="grid">
          <article class="card">
            <h2>下载地址</h2>
            <p>所有安装包统一发布到 GitHub Release 页面。</p>
          </article>
          <article class="card">
            <h2>许可证</h2>
            <p>允许所有开源非商用项目使用，商业用途需要额外书面授权。</p>
          </article>
          <article class="card">
            <h2>更新检查</h2>
            <p>应用内和本页面都优先使用 GitHub Release API，并在 API 限流时回退到静态更新清单。</p>
          </article>
        </section>
      </div>
    </main>
    <script>
      const statusEl = document.getElementById('release-status');
      const checkButton = document.getElementById('check-update');

      function renderStatus(type, message) {
        statusEl.className = `status ${type}`;
        statusEl.innerHTML = `<strong>更新状态</strong><p>${message}</p>`;
      }

      async function fetchLatestRelease() {
        try {
          const response = await fetch('https://api.github.com/repos/unknownparticles/md/releases/latest', {
            headers: {
              Accept: 'application/vnd.github+json',
            },
          });

          if (!response.ok) {
            throw new Error(`GitHub Release 返回 ${response.status}`);
          }

          return {
            release: await response.json(),
            fallbackReason: '',
          };
        } catch (error) {
          const response = await fetch('./update.json', {cache: 'no-store'});
          if (!response.ok) {
            throw new Error(`静态更新清单返回 ${response.status}`);
          }

          return {
            release: await response.json(),
            fallbackReason: error instanceof Error ? error.message : 'GitHub Release API 不可用',
          };
        }
      }

      checkButton.addEventListener('click', async () => {
        renderStatus('', '正在检查更新...');

        try {
          const {release, fallbackReason} = await fetchLatestRelease();
          const name = release.tag_name || release.name || '未知版本';
          const url = release.html_url || 'https://github.com/unknownparticles/md/releases';
          const fallbackText = fallbackReason ? `（GitHub API 不可用：${fallbackReason}，已改用静态清单）` : '';
          renderStatus('success', `发现最新版本：<a href="${url}">${name}</a>${fallbackText}`);
        } catch (error) {
          renderStatus('failed', error instanceof Error ? `检查失败：${error.message}。` : '检查失败：无法访问更新来源。');
        }
      });
    </script>
  </body>
</html>
